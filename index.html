<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animal Number Game</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #e0f7fa;
    font-family: Arial;
  }

  #animal {
    position: absolute;
    font-size: 80px;
    left: 50%;
    top: 70%;
    transform: translate(-50%, -50%);
    transition: 0.1s;
  }

  .number {
    position: absolute;
    font-size: 50px;
    font-weight: bold;
    cursor: pointer;
    transition: all 1s linear;
  }

  #info {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 24px;
  }

</style>

</head>
<body>

<div id="animal">🐸</div>
<div id="info"></div>

<script>
let currentNumber = 1;
let correctCount = 0;

const animals = [
  "🐸","🐘","🐶","🐱","🐵",
  "🐼","🦁","🐰","🐯","🐻"
];

// 🖱️ Animal follow mouse
document.addEventListener("mousemove", (e) => {
  let animal = document.getElementById("animal");
  animal.style.left = e.clientX + "px";
  animal.style.top = e.clientY + "px";
});

// Generate moving numbers
function createNumbers() {
  document.querySelectorAll(".number").forEach(n => n.remove());

  for (let i = 1; i <= 10; i++) {
    let num = document.createElement("div");
    num.className = "number";
    num.innerText = i;

    num.style.left = Math.random() * window.innerWidth + "px";
    num.style.top = Math.random() * window.innerHeight + "px";

    // random movement
function moveNumberRandomly(num) {
  function move() {
    num.style.left = Math.random() * (window.innerWidth - 50) + "px";
    num.style.top = Math.random() * (window.innerHeight - 50) + "px";

    let nextMove = Math.random() * 2000 + 3000; // 3 - 5 detik
    setTimeout(move, nextMove);
  }
  move();
}

    num.onclick = () => checkAnswer(i);

    document.body.appendChild(num);
  }
}

function updateUI() {
  document.getElementById("animal").innerText = animals[currentNumber - 1];
  document.getElementById("info").innerText =
    "Find number: " + currentNumber + " | Correct: " + correctCount + "/3";
}

function checkAnswer(clicked) {
  if (clicked === currentNumber) {
    correctCount++;

    if (correctCount >= 3) {
      currentNumber++;
      correctCount = 0;

      if (currentNumber > 10) {
        endGame();
        return;
      }
    }
  }

  updateUI();
}

function endGame() {
  document.body.innerHTML = `
    <h1 style="text-align:center; margin-top:100px;">
      🎉 Great Job!
    </h1>
    <div style="text-align:center;">
      <button onclick="location.reload()" style="font-size:20px; padding:10px;">
        Play Again
      </button>
    </div>
  `;
}

createNumbers();
updateUI();
</script>

</body>
</html>
