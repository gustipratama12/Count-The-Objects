<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Count the Objects Game</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f0f8ff;
  }

  h1 {
    color: #333;
  }

  #objects {
    font-size: 40px;
    margin: 20px;
  }

  button {
    padding: 12px 20px;
    margin: 10px;
    font-size: 18px;
    cursor: pointer;
    border-radius: 10px;
  }

  .correct {
    background-color: #4CAF50;
    color: white;
  }

  .wrong {
    background-color: #f44336;
    color: white;
  }

  #result {
    font-size: 20px;
    margin-top: 15px;
    font-weight: bold;
  }
</style>

</head>
<body>

<h1>🔢 Count the Objects</h1>

<p>How many objects do you see?</p>

<div id="objects"></div>

<div id="choices"></div>

<p id="result"></p>

<script>
let currentNumber = 1;

const emojis = ["🍎","🍌","🐶","🐱","🍇","🍊","⭐","⚽","🚗","🐸"];

function generateObjects(num) {
  let obj = "";
  for (let i = 0; i < num; i++) {
    obj += emojis[Math.floor(Math.random() * emojis.length)] + " ";
  }
  return obj;
}

function generateChoices(correct) {
  let choices = [correct];

  while (choices.length < 3) {
    let random = Math.floor(Math.random() * 15) + 1;
    if (!choices.includes(random)) {
      choices.push(random);
    }
  }

  return choices.sort(() => Math.random() - 0.5);
}

function loadQuestion() {
  document.getElementById("result").innerText = "";

  if (currentNumber > 15) {
    document.body.innerHTML = `
      <h1>🎉 Great Job!</h1>
      <p>You finished all levels!</p>
      <button onclick="location.reload()">Play Again</button>
    `;
    return;
  }

  document.getElementById("objects").innerText = generateObjects(currentNumber);

  let choices = generateChoices(currentNumber);
  let buttons = "";

  choices.forEach(choice => {
    buttons += `<button onclick="checkAnswer(${choice})">${choice}</button>`;
  });

  document.getElementById("choices").innerHTML = buttons;
}

function checkAnswer(answer) {
  if (answer === currentNumber) {
    document.getElementById("result").innerText = "✅ Correct!";
    document.getElementById("result").style.color = "green";

    setTimeout(() => {
      currentNumber++;
      loadQuestion();
    }, 1000);

  } else {
    document.getElementById("result").innerText = "❌ Try again!";
    document.getElementById("result").style.color = "red";
  }
}

loadQuestion();
</script>

</body>
</html>
